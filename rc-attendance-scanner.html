<script>
/* =========================================================================
   FIREBASE — same project as the MBR2 Sponsorship Dashboard (index.html) and
   the CVC App. Scans written here (to the "attendance" collection) show up
   automatically in the dashboard's "QR Attendance" tab — no export/import,
   no separate backend to configure. Keep this config identical to the one
   in index.html so both apps read/write the same database.
   ========================================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyBtHvbtxFFkaN09MqSN2CGwiKobzuQJS_M",
  authDomain: "mbr2-dashboard.firebaseapp.com",
  projectId: "mbr2-dashboard",
  storageBucket: "mbr2-dashboard.firebasestorage.app",
  messagingSenderId: "122727869591",
  appId: "1:122727869591:web:76a9f92a2740b40a920dd2"
};
const _fbReady = firebaseConfig.apiKey !== "YOUR_API_KEY";
let _authPromise = null;
let db = null;
if(_fbReady){
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
}
function ensureAuth(){
  if(!_fbReady) return Promise.reject(new Error('Firebase is not configured'));
  if(!_authPromise){
    _authPromise = new Promise((resolve, reject) => {
      firebase.auth().onAuthStateChanged(user => { if(user) resolve(user); });
      firebase.auth().signInAnonymously().catch(reject);
    });
  }
  return _authPromise;
}

/* ---- RC roster (read-only, best-effort) ----
   Loaded once in the background so scans can show the child's real name right away.
   Stored the same way the dashboard stores it: one JSON blob (possibly split into
   several documents if it's over Firestore's ~1MB limit) at shared/sd:rc:v1. If it
   hasn't finished loading yet (or the roster is huge / connection is slow), scanning
   still works fine — the scan is recorded either way, just without a name shown yet.
   The dashboard itself re-verifies every scan against the live roster when you view
   the "QR Attendance" tab, so nothing is ever permanently "unmatched" because of this. */
let ROSTER = null;          // { ChildID: {ChildNameKh, ChildNameEn, ...} } once loaded
let ROSTER_LOADING = false;
const configNoteEl = document.getElementById('configNote');

async function fbGetChunked(collRef, docId){
  const snap = await collRef.doc(docId).get();
  if(!snap.exists) return null;
  const data = snap.data();
  if(!data.chunked) return data.value;
  const chunkSnaps = await Promise.all(Array.from({ length: data.chunkCount }, (_, i) => collRef.doc(docId+'__c'+i).get()));
  return chunkSnaps.map(s => s.exists ? s.data().value : '').join('');
}

async function loadRosterInBackground(){
  if(ROSTER_LOADING || !_fbReady) return;
  ROSTER_LOADING = true;
  try{
    await ensureAuth();
    configNoteEl.textContent = 'ភ្ជាប់បានជោគជ័យ — កំពុងផ្ទុកបញ្ជីកុមារ… / Connected — loading roster…';
    configNoteEl.className = 'config-note';
    const raw = await fbGetChunked(db.collection('shared'), 'sd:rc:v1');
    ROSTER = raw ? JSON.parse(raw) : {};
    configNoteEl.textContent = '✓ ភ្ជាប់បានជោគជ័យ · Connected — ' + Object.keys(ROSTER).length + ' RC loaded';
    configNoteEl.className = 'config-note ok';
  }catch(e){
    ROSTER = null;
    configNoteEl.textContent = "⚠️ បានភ្ជាប់ ប៉ុន្តែផ្ទុកបញ្ជីកុមារមិនបាន — ស្កេននៅតែដំណើរការ · Connected, but couldn't load the roster — scanning still works";
    configNoteEl.className = 'config-note warn';
  }
  ROSTER_LOADING = false;
}

if(_fbReady){
  ensureAuth().then(loadRosterInBackground).catch(() => {
    configNoteEl.textContent = '⚠️ មិនអាចភ្ជាប់បានទេ — ពិនិត្យអ៊ីនធឺណិត · Could not connect — check your internet connection';
    configNoteEl.className = 'config-note warn';
  });
} else {
  configNoteEl.textContent = '⚠️ Firebase not configured — edit firebaseConfig in this file';
  configNoteEl.className = 'config-note warn';
}

/* ---- offline queue ----
   If a scan can't be written immediately (no signal, which happens often in the
   field), it's kept in localStorage and retried automatically — on the next
   successful scan, when the browser comes back online, and every 15s while
   scanning is active. Nothing is lost just because a village has weak signal. */
const PENDING_KEY = 'rcAttendancePendingScans';
function loadPending(){
  try{ return JSON.parse(localStorage.getItem(PENDING_KEY) || '[]'); }catch(e){ return []; }
}
function savePending(list){
  try{ localStorage.setItem(PENDING_KEY, JSON.stringify(list)); }catch(e){}
  updatePendingNote();
}
function updatePendingNote(){
  const n = loadPending().length;
  const note = document.getElementById('pendingNote');
  if(n > 0){
    note.className = '';
    note.innerHTML = '<span class="pending-pill">⏳ ' + n + ' scan' + (n>1?'s':'') + ' waiting to sync</span>';
  } else {
    note.className = 'hidden';
  }
}
async function flushPending(){
  if(!_fbReady) return;
  const list = loadPending();
  if(!list.length) return;
  const remaining = [];
  for(const item of list){
    try{
      await ensureAuth();
      await db.collection('attendance').add(item);
    }catch(e){
      remaining.push(item);
    }
  }
  savePending(remaining);
}
window.addEventListener('online', flushPending);
setInterval(flushPending, 15000);
updatePendingNote();

(function populateOfficerDatalist(){

/* ---- Topic dropdown -> hidden #activityName, with "ផ្សេងៗ Other" fallback ---- */
function syncActivityName(){
  const sel = document.getElementById('activityTopicSelect').value;
  const otherInput = document.getElementById('activityTopicOther');
  const hidden = document.getElementById('activityName');
  if(sel === '__other__'){
    otherInput.classList.remove('hidden');
    hidden.value = otherInput.value.trim();
  } else {
    otherInput.classList.add('hidden');
    hidden.value = sel;
  }
}
document.getElementById('activityTopicSelect').addEventListener('change', syncActivityName);
document.getElementById('activityTopicOther').addEventListener('input', syncActivityName);

document.getElementById('startBtn').addEventListener('click', () => {
  const activity = document.getElementById('activityName').value.trim();
  if (!activity) {
    alert('សូមបញ្ចូលឈ្មោះកម្មវិធីជាមុន / Please enter an Activity Name first.');
    return;
  }
  document.getElementById('setupCard').classList.add('hidden');
  document.getElementById('scanCard').classList.remove('hidden');
  document.getElementById('manualCard').classList.remove('hidden');
  document.getElementById('logCard').classList.remove('hidden');
  startScanner();
  flushPending();
});

document.getElementById('stopBtn').addEventListener('click', () => {
  stopScanner();
  document.getElementById('setupCard').classList.remove('hidden');
  document.getElementById('scanCard').classList.add('hidden');
});

document.getElementById('manualSubmit').addEventListener('click', () => {
  const code = document.getElementById('manualCode').value.trim();
  if (code) {
    submitAttendance(code);
    document.getElementById('manualCode').value = '';
  }
});

function startScanner() {
  html5QrCode = new Html5Qrcode("reader");
  const config = { fps: 10, qrbox: { width: 250, height: 250 } };
  html5QrCode.start(
    { facingMode: "environment" },
    config,
    (decodedText) => onScanSuccess(decodedText),
    (errorMessage) => { /* ignore per-frame scan errors */ }
  ).catch((err) => {
    showStatus('error', 'Camera error: ' + err);
  });
}

function stopScanner() {
  if (html5QrCode) {
    html5QrCode.stop().catch(() => {});
  }
}

function onScanSuccess(code) {
  const now = Date.now();
  if (code === lastCode && (now - lastTime) < COOLDOWN_MS) {
    return; // debounce duplicate rapid scans
  }
  lastCode = code;
  lastTime = now;
  submitAttendance(code);
}

async function submitAttendance(code) {
  const activity = document.getElementById('activityName').value.trim();
  const officer = document.getElementById('officerName').value.trim();

  if (!_fbReady) {
    showStatus('error', 'Backend not configured. Edit firebaseConfig in this file first.');
    return;
  }

  const rc = ROSTER ? ROSTER[code] : null;
  const verified = !!rc;
  const name = rc ? (rc.ChildNameKh || rc.ChildNameEn || '') : '';

  showStatus('info', 'ដំណើរការ... / Recording ' + code + '...');

  const record = {
    code: code,
    activity: activity,
    officer: officer,
    verified: verified,
    name: name || null,
    ts: Date.now()
  };

  try {
    await ensureAuth();
    await db.collection('attendance').add(record);
    const label = verified ? (name || code) : code + ' (not found in roster)';
    showStatus(verified ? 'success' : 'warn', (verified ? '✓ ' : '⚠️ ') + label + ' — recorded');
    addLogEntry(code, verified, name, false);
    flushPending();
  } catch (err) {
    // No signal right now — queue it locally and try again automatically.
    const pending = loadPending();
    pending.push(record);
    savePending(pending);
    showStatus('warn', '⏳ ' + code + ' — saved offline, will sync automatically');
    addLogEntry(code, verified, name, true);
  }
}

function addLogEntry(code, verified, name, queued) {
  const time = new Date().toLocaleTimeString();
  sessionLog.unshift({ code: code, name: name, time: time, verified: verified, queued: queued });
  const list = document.getElementById('logList');
  list.innerHTML = sessionLog.slice(0, 20).map(item =>
    '<div class="log-item"><span class="code">' + item.code + (item.verified ? '' : ' ⚠️') + (item.queued ? ' ⏳' : '') + (item.name ? ' — ' + item.name : '') + '</span><span class="time">' + item.time + '</span></div>'
  ).join('');
}

function showStatus(type, message) {
  const el = document.getElementById('status');
  el.className = type;
  el.textContent = message;
}
</script>
